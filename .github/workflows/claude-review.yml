# .github/workflows/claude-review.yml
name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-sonnet-4-6
          prompt: |
            Review this PR diff for:
            1. Bugs and logic errors — including off-by-one errors, wrong index/slice boundaries, incorrect comparisons
            2. Security vulnerabilities (injection, XSS, exposed secrets, unsafe input handling)
            3. Code quality issues (readability, naming, duplication)

            Be concise. Only flag real issues with severity (HIGH/MEDIUM/LOW) and file:line reference.
            If everything looks good, say so in one line.
